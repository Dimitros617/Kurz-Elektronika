<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>⚡ Hlasovátko</title>
<style>
  :root {
    --bg: #0b0e1a;
    --panel: rgba(255,255,255,.06);
    --border: rgba(255,255,255,.12);
    --text: #eef1ff;
    --muted: #8b93b8;
    --cA: #ff5d73; --cB: #ffb84d; --cC: #3ddc97; --cD: #5b8cff;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* ===== živé pozadí ===== */
  .bg {
    position: fixed; inset: 0; z-index: -2;
    background: linear-gradient(120deg, #0b0e1a, #141a3a, #0d2440, #1a0f33, #0b0e1a);
    background-size: 400% 400%;
    animation: gradientmove 24s ease infinite;
  }
  @keyframes gradientmove {
    0% {background-position: 0% 50%} 50% {background-position: 100% 50%} 100% {background-position: 0% 50%}
  }
  .blob {
    position: fixed; border-radius: 50%; filter: blur(90px); opacity: .35; z-index: -1;
    animation: float 18s ease-in-out infinite alternate;
  }
  .blob.b1 { width: 45vw; height: 45vw; background: #4636c9; top: -15vw; left: -10vw; }
  .blob.b2 { width: 38vw; height: 38vw; background: #0a7d6c; bottom: -12vw; right: -8vw; animation-duration: 23s; }
  .blob.b3 { width: 26vw; height: 26vw; background: #a13b6e; top: 40vh; left: 38vw; animation-duration: 15s; }
  @keyframes float {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(6vw, -5vh) scale(1.15); }
  }

  /* ===== hlavička ===== */
  header {
    display: flex; align-items: center; gap: 28px;
    padding: 14px 28px;
    background: var(--panel); border-bottom: 1px solid var(--border);
    backdrop-filter: blur(8px);
  }
  header .logo { font-size: 1.7rem; font-weight: 800; letter-spacing: .5px; }
  header .net { display: flex; gap: 26px; align-items: baseline; flex: 1; justify-content: center; }
  header .net .item { text-align: center; }
  header .net .label { font-size: .7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); }
  header .net .value { font-size: 1.6rem; font-weight: 700; font-variant-numeric: tabular-nums; }
  header .net input {
    background: transparent; border: none; border-bottom: 1px dashed var(--border);
    color: var(--text); font-size: 1.6rem; font-weight: 700; text-align: center; width: 220px; outline: none;
  }
  header .counter {
    font-size: 1.4rem; font-weight: 800; padding: 8px 18px; border-radius: 14px;
    background: rgba(255,184,77,.15); border: 1px solid rgba(255,184,77,.4);
  }
  header .counter.pop { animation: pop .35s ease; }
  #muteBtn { background: none; border: 1px solid var(--border); color: var(--text);
    border-radius: 10px; padding: 8px 12px; font-size: 1.1rem; cursor: pointer; }

  @keyframes pop {
    0% {transform: scale(1)} 40% {transform: scale(1.25)} 100% {transform: scale(1)}
  }

  /* ===== layout ===== */
  main { display: grid; grid-template-columns: 1fr 2fr; gap: 22px; padding: 22px 28px; height: calc(100vh - 76px); }

  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 20px;
    padding: 22px; backdrop-filter: blur(8px); display: flex; flex-direction: column; overflow: hidden;
  }

  /* ===== admin ===== */
  #admin h2 { font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 14px; }
  #admin textarea, #admin input[type=text] {
    width: 100%; background: rgba(0,0,0,.3); border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); font-size: 1.05rem; padding: 12px 14px; margin-bottom: 10px; outline: none;
    font-family: inherit; resize: none;
  }
  #admin textarea:focus, #admin input:focus { border-color: #5b8cff; }
  #admin textarea { height: 84px; }
  .optrow { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .optrow .tag { width: 38px; height: 38px; border-radius: 10px; display: grid; place-items: center; font-weight: 800; flex: none; }
  .tag.A {background: var(--cA)} .tag.B {background: var(--cB); color:#222} .tag.C {background: var(--cC); color:#143} .tag.D {background: var(--cD)}
  .optrow input { margin-bottom: 0 !important; }
  #admin .btns { display: flex; gap: 10px; margin-top: auto; padding-top: 14px; flex-wrap: wrap; }
  button.big {
    flex: 1; padding: 14px 18px; font-size: 1.05rem; font-weight: 700; border: none; border-radius: 14px;
    cursor: pointer; color: white; transition: transform .15s ease, filter .15s;
  }
  button.big:hover { transform: translateY(-2px); filter: brightness(1.15); }
  button.big:active { transform: scale(.97); }
  #startBtn { background: linear-gradient(135deg, #5b8cff, #7b4dff); }
  .revealrow { display: flex; gap: 8px; margin-top: 10px; }
  .revealrow button {
    flex: 1; padding: 10px 0; font-weight: 800; font-size: 1rem; border: 1px solid var(--border);
    background: rgba(0,0,0,.3); color: var(--text); border-radius: 10px; cursor: pointer;
  }
  .revealrow button:hover { border-color: #fff; }
  .revealrow .lbl { flex: 1.6; border: none; background: none; color: var(--muted); cursor: default; font-weight: 600; }

  /* ===== výsledky ===== */
  #qtext { font-size: 2rem; font-weight: 800; min-height: 2.6rem; margin-bottom: 18px; }
  #qtext .caret { animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% {opacity: 0} }
  #chart { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; align-items: end; min-height: 0; }
  .col { display: flex; flex-direction: column; height: 100%; min-height: 0; }
  .bar-area { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; min-height: 0; }
  .count { text-align: center; font-size: 2.2rem; font-weight: 800; margin-bottom: 6px; }
  .bar {
    border-radius: 14px 14px 0 0; min-height: 8px;
    transition: height .7s cubic-bezier(.2, 1.4, .4, 1);  /* pružinový overshoot */
  }
  .bar.pulse { animation: pulse .5s ease; }
  @keyframes pulse { 50% { filter: brightness(1.6); } }
  .col.A .bar {background: linear-gradient(180deg, #ff8298, var(--cA))}
  .col.B .bar {background: linear-gradient(180deg, #ffd08a, var(--cB))}
  .col.C .bar {background: linear-gradient(180deg, #7af0c0, var(--cC))}
  .col.D .bar {background: linear-gradient(180deg, #8fb0ff, var(--cD))}
  .opt-label {
    padding: 10px 6px; text-align: center; font-weight: 700; font-size: 1.05rem;
    border-top: 3px solid; min-height: 64px;
  }
  .col.A .opt-label {border-color: var(--cA)} .col.B .opt-label {border-color: var(--cB)}
  .col.C .opt-label {border-color: var(--cC)} .col.D .opt-label {border-color: var(--cD)}
  .opt-label .letter { opacity: .7; margin-right: 6px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; padding: 6px 2px; max-height: 110px; overflow-y: auto; }
  .chip {
    background: rgba(255,255,255,.12); border: 1px solid var(--border);
    padding: 4px 12px; border-radius: 999px; font-size: .92rem; font-weight: 600; cursor: pointer;
    animation: flyin .55s cubic-bezier(.2, 1.6, .4, 1);
  }
  .chip:hover { background: rgba(255,93,115,.3); text-decoration: line-through; }
  @keyframes flyin {
    0% { transform: translateY(-60px) scale(.3) rotate(-12deg); opacity: 0; }
    60% { transform: translateY(6px) scale(1.15) rotate(3deg); }
    100% { transform: translateY(0) scale(1) rotate(0); opacity: 1; }
  }

  /* odhalení správné odpovědi */
  #chart.revealed .col { transition: opacity .6s, filter .6s; }
  #chart.revealed .col.wrong { opacity: .25; filter: grayscale(.9); }
  #chart.revealed .col.winner .bar { animation: winnerGlow 1.2s ease infinite alternate; }
  #chart.revealed .col.winner .chip { background: rgba(61,220,151,.35); border-color: var(--cC); }
  @keyframes winnerGlow {
    from { box-shadow: 0 0 18px 2px rgba(255,255,255,.35); }
    to   { box-shadow: 0 0 42px 10px rgba(255,255,255,.65); }
  }

  .offline { position: fixed; bottom: 12px; right: 16px; color: var(--cA); font-weight: 700; display: none; }
  #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
<canvas id="confetti"></canvas>

<header>
  <div class="logo">⚡ Hlasovátko</div>
  <div class="net">
    <div class="item"><div class="label">Server</div><div class="value" id="serverIp">…</div></div>
    <div class="item"><div class="label">WiFi SSID</div><input id="ssid" placeholder="nazev-wifi"></div>
    <div class="item"><div class="label">Heslo</div><input id="pass" placeholder="heslo"></div>
  </div>
  <div class="counter" id="counter">🔥 0 hlasů</div>
  <button id="muteBtn" title="zvuk">🔊</button>
</header>

<main>
  <!-- ===== ADMIN ===== -->
  <section class="card" id="admin">
    <h2>Nová otázka</h2>
    <textarea id="fText" placeholder="Sem napiš otázku…"></textarea>
    <div class="optrow"><div class="tag A">A</div><input type="text" id="fA" placeholder="možnost A"></div>
    <div class="optrow"><div class="tag B">B</div><input type="text" id="fB" placeholder="možnost B"></div>
    <div class="optrow"><div class="tag C">C</div><input type="text" id="fC" placeholder="možnost C"></div>
    <div class="optrow"><div class="tag D">D</div><input type="text" id="fD" placeholder="možnost D"></div>
    <div class="btns">
      <button class="big" id="startBtn">🚀 Uložit a spustit</button>
    </div>
    <div class="revealrow">
      <button class="lbl">✅ Odhalit správnou:</button>
      <button onclick="odhalit('A')">A</button>
      <button onclick="odhalit('B')">B</button>
      <button onclick="odhalit('C')">C</button>
      <button onclick="odhalit('D')">D</button>
    </div>
  </section>

  <!-- ===== VÝSLEDKY ===== -->
  <section class="card">
    <div id="qtext">Čekám na první otázku<span class="caret">▌</span></div>
    <div id="chart">
      <div class="col A"><div class="bar-area"><div class="count">0</div><div class="bar" style="height:8px"></div></div><div class="opt-label"><span class="letter">A</span><span class="txt"></span></div><div class="chips"></div></div>
      <div class="col B"><div class="bar-area"><div class="count">0</div><div class="bar" style="height:8px"></div></div><div class="opt-label"><span class="letter">B</span><span class="txt"></span></div><div class="chips"></div></div>
      <div class="col C"><div class="bar-area"><div class="count">0</div><div class="bar" style="height:8px"></div></div><div class="opt-label"><span class="letter">C</span><span class="txt"></span></div><div class="chips"></div></div>
      <div class="col D"><div class="bar-area"><div class="count">0</div><div class="bar" style="height:8px"></div></div><div class="opt-label"><span class="letter">D</span><span class="txt"></span></div><div class="chips"></div></div>
    </div>
  </section>
</main>
<div class="offline" id="offline">⚠ server neodpovídá…</div>

<script>
"use strict";
const $ = s => document.querySelector(s);
const VOLBY = ["A", "B", "C", "D"];

/* ===== hlavička: IP + SSID/heslo (localStorage) ===== */
fetch("/api/info").then(r => r.json()).then(i => {
  $("#serverIp").textContent = `http://${i.ip}:${i.port}`;
});
for (const id of ["ssid", "pass"]) {
  const el = document.getElementById(id);
  el.value = localStorage.getItem("kviz_" + id) || "";
  el.addEventListener("input", () => localStorage.setItem("kviz_" + id, el.value));
}

/* ===== zvuky (WebAudio, žádné soubory) ===== */
let muted = false;
$("#muteBtn").onclick = () => { muted = !muted; $("#muteBtn").textContent = muted ? "🔇" : "🔊"; };
const actx = new (window.AudioContext || window.webkitAudioContext)();
function tone(freq, dur = .12, type = "sine", when = 0, vol = .25) {
  if (muted) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, actx.currentTime + when);
  g.gain.exponentialRampToValueAtTime(.001, actx.currentTime + when + dur);
  o.connect(g).connect(actx.destination);
  o.start(actx.currentTime + when); o.stop(actx.currentTime + when + dur + .05);
}
const popSound = () => tone(620 + Math.random() * 300, .1, "triangle");
const fanfare = () => { tone(523, .18, "square", 0, .15); tone(659, .18, "square", .15, .15); tone(784, .4, "square", .3, .2); };

/* ===== konfety ===== */
const canvas = $("#confetti"), ctx = canvas.getContext("2d");
let parts = [];
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
addEventListener("resize", resize); resize();
const COLORS = ["#ff5d73", "#ffb84d", "#3ddc97", "#5b8cff", "#c77dff", "#fff"];
function burst(x, y, n = 24, power = 7) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, v = (Math.random() * .7 + .3) * power;
    parts.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v - 3,
      s: Math.random() * 7 + 3, c: COLORS[Math.random() * COLORS.length | 0],
      r: Math.random() * Math.PI, vr: (Math.random() - .5) * .3, life: 90 + Math.random() * 40 });
  }
}
function megaburst() {
  for (let i = 0; i < 6; i++)
    setTimeout(() => burst(Math.random() * innerWidth, Math.random() * innerHeight * .55, 60, 11), i * 130);
}
(function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  parts = parts.filter(p => p.life-- > 0);
  for (const p of parts) {
    p.x += p.vx; p.y += p.vy; p.vy += .18; p.r += p.vr;
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r);
    ctx.globalAlpha = Math.min(1, p.life / 40);
    ctx.fillStyle = p.c; ctx.fillRect(-p.s / 2, -p.s / 2, p.s, p.s * .6);
    ctx.restore();
  }
  requestAnimationFrame(loop);
})();

/* ===== admin akce ===== */
$("#startBtn").onclick = async () => {
  const body = { text: $("#fText").value, a: $("#fA").value, b: $("#fB").value, c: $("#fC").value, d: $("#fD").value };
  if (!body.text.trim()) { $("#fText").focus(); return; }
  const r = await fetch("/api/admin/otazka", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
  if (r.ok) {
    for (const id of ["fText", "fA", "fB", "fC", "fD"]) $("#" + id).value = "";
    $("#fText").focus();
    tone(880, .15, "sine");
  }
};
async function odhalit(v) {
  await fetch("/api/admin/odhalit", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ volba: v }) });
}
async function smazat(nick) {
  if (!confirm(`Smazat odpověď žáka „${nick}“? Bude muset poslat znovu.`)) return;
  await fetch("/api/admin/odpoved?nick=" + encodeURIComponent(nick), { method: "DELETE" });
}

/* ===== polling výsledků (stejný princip jako ESP dětí!) ===== */
let lastQ = -1, lastTotal = 0, lastSpravna = null;
let known = new Set();   // nick|volba — kvůli fly-in animaci jen nových

let typeTimer = null;
function typewriter(text) {
  const el = $("#qtext");
  clearInterval(typeTimer);
  let i = 0;
  typeTimer = setInterval(() => {
    i++;
    el.innerHTML = text.slice(0, i).replace(/</g, "&lt;") + '<span class="caret">▌</span>';
    if (i >= text.length) clearInterval(typeTimer);
  }, 28);
}

async function poll() {
  let v;
  try {
    v = await (await fetch("/api/vysledky")).json();
    $("#offline").style.display = "none";
  } catch {
    $("#offline").style.display = "block";
    return;
  }
  if (!v.otazka_id) return;

  // nová otázka -> reset + typewriter
  if (v.otazka_id !== lastQ) {
    lastQ = v.otazka_id; lastTotal = 0; lastSpravna = null; known = new Set();
    $("#chart").classList.remove("revealed");
    document.querySelectorAll(".chips").forEach(c => c.innerHTML = "");
    typewriter(v.text);
  }

  const total = VOLBY.reduce((s, k) => s + v.pocty[k], 0);
  const maxC = Math.max(1, ...VOLBY.map(k => v.pocty[k]));

  for (const k of VOLBY) {
    const col = $(".col." + k);
    col.querySelector(".opt-label .txt").textContent = v.moznosti[k];
    col.querySelector(".count").textContent = v.pocty[k];
    const bar = col.querySelector(".bar");
    const hpx = v.pocty[k] === 0 ? "8px" : `calc(${Math.round((v.pocty[k] / maxC) * 88)}% + 8px)`;
    if (bar.style.height !== hpx) {
      bar.style.height = hpx;
      bar.classList.remove("pulse"); void bar.offsetWidth; bar.classList.add("pulse");
    }
    // chips: přidat nové, odebrat smazané
    const chipsEl = col.querySelector(".chips");
    const current = new Set(v.nicky[k]);
    chipsEl.querySelectorAll(".chip").forEach(ch => { if (!current.has(ch.textContent)) ch.remove(); });
    for (const nick of v.nicky[k]) {
      const key = nick + "|" + k;
      if (!known.has(key)) {
        known.add(key);
        // smaž starou chip stejného nicku v jiném sloupci (přepsaná odpověď)
        VOLBY.filter(o => o !== k).forEach(o => {
          known.delete(nick + "|" + o);
          document.querySelectorAll(`.col.${o} .chip`).forEach(ch => { if (ch.textContent === nick) ch.remove(); });
        });
        const chip = document.createElement("span");
        chip.className = "chip"; chip.textContent = nick;
        chip.onclick = () => smazat(nick);
        chipsEl.append(chip);
        const r = chip.getBoundingClientRect();
        burst(r.left + r.width / 2, r.top, 18, 5);
        popSound();
      }
    }
  }

  // počítadlo
  if (total !== lastTotal) {
    const c = $("#counter");
    c.textContent = `🔥 ${total} hlasů`;
    c.classList.remove("pop"); void c.offsetWidth; c.classList.add("pop");
    lastTotal = total;
  }

  // odhalení
  if (v.spravna && v.spravna !== lastSpravna) {
    lastSpravna = v.spravna;
    $("#chart").classList.add("revealed");
    for (const k of VOLBY) {
      const col = $(".col." + k);
      col.classList.toggle("winner", k === v.spravna);
      col.classList.toggle("wrong", k !== v.spravna);
    }
    megaburst(); fanfare();
  }
}
setInterval(poll, 1000);
poll();
</script>
</body>
</html>
